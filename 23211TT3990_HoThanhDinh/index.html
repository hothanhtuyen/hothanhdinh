<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập JS DOM</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #222;
            margin-bottom: 20px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-weight: bold;
            margin-right: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        input {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 10px;
        }

        .album {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .album img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .album img:hover {
            transform: scale(1.05);
        }

        #mainImg {
            width: 300px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        ul li {
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

    <!-- Bài 1 -->

    <div class="box">
        <h1>Bài 1: Danh sách sinh viên</h1>

        <ul id="studentList">
            <li>Nguyễn Văn A</li>
            <li>Trần Thị B</li>
            <li>Lê Văn C</li>
        </ul>
    </div>

    <!-- Bài 2 -->

    <div class="box">
        <h1>Bài 2: Thay đổi kích thước</h1>

        <p id="text">
            Học lập trình JavaScript cùng DOM thật thú vị!
        </p>

        <button onclick="increaseFont()">Phóng to (+)</button>

        <button onclick="decreaseFont()">Thu nhỏ (-)</button>
    </div>

    <!-- Bài 3 -->

    <div class="box">
        <h1>Bài 3: Kiểm tra mật khẩu</h1>

        <input type="password"
            id="password"
            placeholder="Nhập mật khẩu của bạn..."
            onkeyup="checkPassword()">

        <p id="lengthText">
            Độ dài mật khẩu: 0
        </p>
    </div>

    <!-- Bài 4 -->

    <div class="box">
        <h1>Bài 4: Album ảnh</h1>

        <img id="mainImg"
            src="https://picsum.photos/id/1015/600/400"
            alt="Main">

        <div class="album">

            <img src="https://picsum.photos/id/1015/200/200"
                onclick="changeImg(this.src)">

            <img src="https://picsum.photos/id/1016/200/200"
                onclick="changeImg(this.src)">

            <img src="https://picsum.photos/id/1018/200/200"
                onclick="changeImg(this.src)">

            <img src="https://picsum.photos/id/1020/200/200"
                onclick="changeImg(this.src)">

        </div>
    </div>

    <script>

        // Bài 2

        let size = 16;

        function increaseFont() {
            size += 2;
            document.getElementById("text").style.fontSize = size + "px";
        }

        function decreaseFont() {
            size -= 2;
            document.getElementById("text").style.fontSize = size + "px";
        }

        // Bài 3

        function checkPassword() {

            let pass =
                document.getElementById("password").value;

            document.getElementById("lengthText")
                .innerText =
                "Độ dài mật khẩu: " + pass.length;
        }

        // Bài 4

        function changeImg(src) {
            document.getElementById("mainImg").src = src;
        }

    </script>

</body>

</html>
